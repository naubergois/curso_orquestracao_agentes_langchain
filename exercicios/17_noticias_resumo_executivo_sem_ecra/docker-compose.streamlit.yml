# Streamlit — boletim (ex. 17) + agente de interface Nielsen (ex. 18).
name: curso-ex17-boletim-streamlit

services:
  streamlit:
    build:
      context: ../..
      dockerfile: exercicios/17_noticias_resumo_executivo_sem_ecra/Dockerfile.streamlit
    ports:
      - "${STREAMLIT_PORT:-8502}:8501"
    env_file:
      - ../../.env
    volumes:
      - ../../.env:/app/.env:ro
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_MODEL_EX17: ${GEMINI_MODEL_EX17:-}
      GEMINI_MODEL_EX18: ${GEMINI_MODEL_EX18:-}
      PYTHONUNBUFFERED: "1"
