# Jupyter + PostgreSQL — ex. 15 sem ecrã (três agentes de vendas).
name: curso-ex15-sem-jupyter

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: curso
      POSTGRES_PASSWORD: curso
      POSTGRES_DB: vendas_demo
    volumes:
      - ./init_db:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curso -d vendas_demo"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 5s

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://curso:curso@db:5432/vendas_demo
      PYTHONUNBUFFERED: "1"
      JUPYTER_TOKEN: ""
    volumes:
      - ../../:/home/jovyan/work/repo:rw
      - ../../.env:/home/jovyan/work/repo/.env:ro
    working_dir: /home/jovyan/work/repo/exercicios/15_vendas_tres_agentes_sem_ecra
    command:
      - start-notebook.sh
      - --ServerApp.token=
      - --ServerApp.password=
      - --ServerApp.ip=0.0.0.0
