# Jupyter — ex. 2 sem ecrã. Streamlit: `02_nerd_sarcastico_com_ecra`. Ver run_jupyter.sh .
name: curso-ex02-sem-jupyter

services:
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    env_file:
      - ../../.env
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL_EX02: ${GEMINI_MODEL_EX02:-gemini-2.0-flash}
      PYTHONUNBUFFERED: "1"
      JUPYTER_TOKEN: ""
    volumes:
      - ../../:/home/jovyan/work/repo:rw
      - ../../.env:/home/jovyan/work/repo/.env:ro
    working_dir: /home/jovyan/work/repo/exercicios/02_nerd_sarcastico_sem_ecra
    command:
      - start-notebook.sh
      - --ServerApp.token=
      - --ServerApp.password=
      - --ServerApp.ip=0.0.0.0
