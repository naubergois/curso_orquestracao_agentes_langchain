# Contentor mínimo: corre `main.py` uma vez. Uso: ./run.sh --once
name: curso-ex00-app

services:
  app:
    build: .
    env_file:
      - ../../.env
    volumes:
      - ../../.env:/app/.env:ro
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      PYTHONUNBUFFERED: "1"
