# Jupyter — ex. 8 sem ecrã (RunnableParallel, Branch, Lambda…). Ver run_jupyter.sh .
name: curso-ex08-sem-jupyter

services:
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    env_file:
      - ../../.env
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_MODEL_EX08: ${GEMINI_MODEL_EX08:-}
      GEMINI_MODEL_FALLBACKS: ${GEMINI_MODEL_FALLBACKS:-}
      PYTHONUNBUFFERED: "1"
      JUPYTER_TOKEN: ""
    volumes:
      - ../../:/home/jovyan/work/repo:rw
      - ../../.env:/home/jovyan/work/repo/.env:ro
    working_dir: /home/jovyan/work/repo/exercicios/08_chains_complexas_sem_ecra
    command:
      - start-notebook.sh
      - --ServerApp.token=
      - --ServerApp.password=
      - --ServerApp.ip=0.0.0.0
