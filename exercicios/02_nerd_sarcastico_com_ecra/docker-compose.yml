# Streamlit — ex. 2 com ecrã. Modelo: GEMINI_MODEL_EX02.
name: curso-ex02-com-ecra

services:
  streamlit:
    build: .
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    env_file:
      - ../../.env
    volumes:
      - ../../.env:/app/.env:ro
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL_EX02: ${GEMINI_MODEL_EX02:-gemini-2.0-flash}
      PYTHONUNBUFFERED: "1"
