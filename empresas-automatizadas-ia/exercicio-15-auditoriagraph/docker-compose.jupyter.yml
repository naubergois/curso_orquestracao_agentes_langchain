# Jupyter sem ecrã — ver run_jupyter.sh
name: curso-emp-15-auditoriagraph-jupyter

services:
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    env_file:
      - ../../.env
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      PYTHONUNBUFFERED: "1"
      JUPYTER_TOKEN: ""
    volumes:
      - ../../:/home/jovyan/work/repo:rw
      - ../../.env:/home/jovyan/work/repo/.env:ro
    working_dir: /home/jovyan/work/repo/empresas-automatizadas-ia/exercicio-15-auditoriagraph
    command:
      - start-notebook.sh
      - --ServerApp.token=
      - --ServerApp.password=
      - --ServerApp.ip=0.0.0.0
