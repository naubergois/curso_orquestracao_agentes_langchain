services:
  api:
    build: .
    container_name: exercicio_16_observaai_api
    command: python app/main.py
    ports:
      - "8016:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app

  dashboard:
    build: .
    container_name: exercicio_16_observaai_ui
    command: streamlit run streamlit_app.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8516:8501"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
    depends_on:
      - api
