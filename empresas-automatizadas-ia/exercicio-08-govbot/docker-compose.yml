services:
  app:
    build: .
    container_name: exercicio_08_govbot
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - qdrant
    volumes:
      - .:/app

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_govbot_ex08
    ports:
      - "6333:6333"
    volumes:
      - qdrant_govbot_data:/qdrant/storage

volumes:
  qdrant_govbot_data:
