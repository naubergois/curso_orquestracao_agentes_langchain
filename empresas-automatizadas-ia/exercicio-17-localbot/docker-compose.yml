services:
  app:
    build: .
    container_name: exercicio_17_localbot
    ports:
      - "8017:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
      # Com serviço ollama abaixo:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_localbot
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

volumes:
  ollama_models:
